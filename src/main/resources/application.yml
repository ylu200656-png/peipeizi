server:
  port: 8080

spring:
  application:
    name: yaojie-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/yaojie?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3s

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.yaojie.modules
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: 7ef027f250ac3efa814f0bce9225af938210fb4ab02fbcd642ea6bf1c36f393f
  expire-seconds: 7200

logging:
  level:
    com.yaojie: info
